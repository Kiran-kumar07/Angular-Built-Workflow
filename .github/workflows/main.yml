name: Built My Angular App

on:
  push:
    branches: [ main ]

jobs:
  built-angular-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node JS
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Dependencies
       run: npm install
       working-directory: ./my-app

      - name: Build Angular App
        run: npm run build
        working-directory: ./my-app
        
      
 
