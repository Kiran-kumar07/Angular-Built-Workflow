name: Built My Angular App

on:
  push:
    branches: [ main ]

jobs:
  built-angular-app:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node JS
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Dependencies
        working-directory: ./my-app
        run: npm install

      - name: Build Angular App
        working-directory: ./my-app
        run: npm run build
 
